<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - Bejeweled</title>
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/signup.css">
    <!-- Grupo: 18, Número: 66567, Nome: Tiago Sun, PL: 21 -->
    <!-- Grupo: 18, Número: 66585, Nome: Lecheng Guo, PL: 21 -->
    <!-- Grupo: 18, Número: 66565, Nome: Xiaoqi Liu, PL: 21 -->
</head>
<body>
    
    <header>
        <img src="imagens/bejeweled.jpg" alt="bejeweled logo" width="100" height="100">
        <h1>Bejeweled</h1>
    </header>

    <main class="main-signup">
        
        <a href="index.html" class="btn-voltar">Voltar</a>

        <form class="caixa-signup" action="#" method="POST" enctype="multipart/form-data">
            <h2>Sign Up</h2>

            <div class="grupo-input">
                <label for="nome">Username</label>
                <input type="text" id="nome" name="nome" placeholder="O teu nome de jogador" required>
            </div>

            <div class="grupo-input">
                <label for="data-nasc">Date of Birth </label>
                <input type="date" id="data-nasc" name="data_nascimento" required>
            </div>

            <div class="grupo-input">
                <label for="avatar">Profile Picture</label>
                <input type="file" id="avatar" name="avatar" accept="image/*" class="input-ficheiro" required>
            </div>

            <div class="grupo-input">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="exemplo@fcul.pt" required>
            </div>

            <div class="grupo-input">
                <label for="senha">Password</label>
                <input type="password" id="senha" name="senha" required>
            </div>

            <div class="acoes-signup">
                <div class="botoes-container">
                    <button type="submit" class="btn-acao">Create Account</button>
                    <a href="login.html" class="btn-secundario">Already have an account? Log In</a>
                </div>
            </div>
        </form>

    </main>

    <footer>
        <p>ITW PL G18 2026</p>
    </footer>
    <audio src="video_e_musica/background_music.mp3" autoplay loop preload="auto"></audio>
</body>
</html>
