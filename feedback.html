<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Feedback - Bejeweled</title>
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/feedback.css">
</head>
<body>
    
    <header>
        <img src="bejeweled.jpg" alt="bejeweled logo" width="100" height="100">
        <h1>Bejeweled</h1>
    </header>

    <main class="main-feedback">
        
        <a href="informacoes.html" class="btn-voltar">Voltar</a>

        <form class="caixa-feedback" action="#" method="POST">
            <h2>Feedback</h2>
            <p class="subtitulo">Tens alguma sugestão ou encontraste um bug? Diz-nos!</p>

            <div class="grupo-input">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="teu.email@fcul.pt" required>
            </div>

            <div class="grupo-input">
                <label for="mensagem">Mensagem</label>
                <textarea id="mensagem" name="mensagem" rows="5" placeholder="Escreve aqui o teu feedback..." required></textarea>
            </div>

            <div class="acoes-feedback">
                <button type="submit" class="btn-acao">Enviar</button>
            </div>
        </form>

    </main>

    <footer>
        <p>ITW PL G18 2026</p>
    </footer>
    <audio src="video_e_musica/background_music.mp3" autoplay loop preload="auto"></audio>
</body>
</html>
