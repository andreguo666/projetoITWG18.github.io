<!DOCTYPE html>
<html lang='pt'></html>
<head>
    <meta charset="UTF-8">
    <title>Login - Bejeweled</title>
    
    <link rel="stylesheet" href="global.css">
</head>
<body>
    <header>
        <img src="imagens/bejeweled.jpg" alt="bejeweled logo" width="100" height="100">
        <h1>Bejeweled</h1>
    </header>
    <main class="forget-password">
        <a href="login.html" class="btn-voltar">Voltar</a>

        <form class="recuperar" action="#" method="POST">
            <h2>Recuperar</h2>

            <div class="grupo-input">
                <label for="Email">Email</label>
                <input type="text" id="Email" name="Email" required>
            </div>

            <div class="grupo-input">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

    </main>
</body>
