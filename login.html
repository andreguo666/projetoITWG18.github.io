<body>
    
    <header>
        <img src="imagens/bejeweled.jpg" alt="bejeweled logo" width="100" height="100">
        <h1>Bejeweled</h1>
    </header>

    <main class="main-login">
        
        <a href="index.html" class="btn-voltar">Voltar</a>

        <form class="caixa-login" action="#" method="POST">
            <h2>Login</h2>

            <div class="grupo-input">
                <label for="username">User Account</label>

            </div>

            <div class="grupo-input">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="acoes-login">
                <a href="recuperar.html" class="link-esqueceu">Forgot Password?</a>
                
                <div class="botoes-container">
                    <a href="escolhermodo.html" class="btn-acao">Log In</a>
                </div>
            </div>
        </form>

    </main>

    <footer>
        <p>ITW PL G18 2026</p>
