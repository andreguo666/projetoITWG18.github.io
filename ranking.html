<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Ranking - Bejeweled</title>
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/ranking.css">
    <!-- Grupo: 18, Número: 66567, Nome: Tiago Sun, PL: 21 -->
    <!-- Grupo: 18, Número: 66585, Nome: Lecheng Guo, PL: 21 -->
    <!-- Grupo: 18, Número: 66565, Nome: Xiaoqi Liu, PL: 21 -->
</head>
<body>
    
    <header>
        <img src="imagens/bejeweled.jpg" alt="bejeweled logo" width="100" height="100">
        <h1>Bejeweled</h1>
    </header>

    <main class="main-ranking">
        
        <a href="informacoes.html" class="btn-voltar">Voltar</a>

        <h2 class="titulo-pagina">Leaderboard </h2>

        <section class="seccao-modo">
            <h3>🏆 Modo Normal</h3>
            
            <div class="tabela-scroll">
                <table class="tabela-ranking">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Jogador</th>
                            <th>Pontuação</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="ouro">
                            <td>1</td>
                            <td>Ana</td>
                            <td>15,400</td>
                        </tr>
                        <tr class="prata">
                            <td>2</td>
                            <td>Afonso</td>
                            <td>12,850</td>
                        </tr>
                        <tr class="bronze">
                            <td>3</td>
                            <td>Tiago</td>
                            <td>10,200</td>
                        </tr>
                        <tr>
                            <td>4</td>
                            <td>Maria</td>
                            <td>8,900</td>
                        </tr>
                        <tr>
                            <td>5</td>
                            <td>João</td>
                            <td>7,500</td>
                        </tr>
                        <tr>
                            <td>6</td>
                            <td>Carolina</td>
                            <td>6,200</td>
                        </tr>
                        <tr>
                            <td>7</td>
                            <td>Pedro</td>
                            <td>5,100</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section class="seccao-modo modo-bloqueado">
            <h3>⏱️ Modo Cronometrado (Em Breve...)</h3>
            <div class="area-reservada">
                <p>O ranking deste modo estará nao disponível</p>
            </div>
        </section>

    </main>

    <footer>
        <p>ITW PL G18 2026</p>
    </footer>
    <audio src="video_e_musica/background_music.mp3" autoplay loop preload="auto"></audio>
</body>
</html>
